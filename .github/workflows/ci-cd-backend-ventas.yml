name: CI/CD Despachos - Backend Ventas

on:
  push:
    branches: [ "deploy" ]

jobs:
  build-push-deploy-backend-ventas:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configura Java 17 necesario para compilar Spring Boot con Maven
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Configura las credenciales de AWS usando los secrets del repositorio
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 4. Inicia sesión en Amazon ECR desde el runner de GitHub Actions
      - name: Login en Amazon ECR (runner)
        uses: aws-actions/amazon-ecr-login@v2

      # 5. Construye la imagen Docker del Backend Ventas y la sube a ECR
      - name: Build imagen Backend Ventas y push a ECR
        run: |
          cd back-Ventas_SpringBoot/Springboot-API-REST
          docker build -f Dockerfile.Ventas -t ventas-backend .
          docker tag ventas-backend:latest ${{ secrets.ECR_REPO_URL_BACKEND_VENTAS }}:latest
          docker push ${{ secrets.ECR_REPO_URL_BACKEND_VENTAS }}:latest

      # 6. Despliega la nueva imagen en la instancia EC2 del Backend usando SSM
      - name: Desplegar Backend Ventas en EC2 vía SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_BACKEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Actualizar ventas-backend desde ECR" \
            --parameters '{"commands":[
              "set -e",
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker pull ${{ secrets.ECR_REPO_URL_BACKEND_VENTAS }}:latest",
              "docker stop ventas-backend || true",
              "docker rm ventas-backend || true",
              "docker run -d --name ventas-backend -p 8080:8080 --restart unless-stopped -e DB_ENDPOINT=${{ secrets.DB_ENDPOINT }} -e DB_PORT=3306 -e DB_NAME=${{ secrets.DB_NAME_VENTAS }} -e DB_USERNAME=${{ secrets.DB_USERNAME }} -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} ${{ secrets.ECR_REPO_URL_BACKEND_VENTAS }}:latest"
            ]}' \
            --output text
