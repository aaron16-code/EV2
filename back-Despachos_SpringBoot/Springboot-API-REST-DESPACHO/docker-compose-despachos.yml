version: '3.8'

services:

  # Base de datos MySQL para Despachos
  mysql-despachos:
    image: mysql:8.0
    container_name: mysql-despachos
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    # Named volume para persistencia de datos
    # Elegimos named volume sobre bind mount porque es gestionado
    # por Docker, más portable y seguro en entornos de producción
    volumes:
      - mysql-despachos-data:/var/lib/mysql
    networks:
      - red-despachos
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Spring Boot Despachos
  backend-despachos:
    image: ${ECR_REPO_URL_BACKEND_DESPACHOS}:latest
    container_name: despachos-backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DB_ENDPOINT: mysql-despachos
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql-despachos:
        condition: service_healthy
    networks:
      - red-despachos

# Named volume para persistencia de MySQL
volumes:
  mysql-despachos-data:
    driver: local

# Red interna para comunicación entre contenedores
networks:
  red-despachos:
    driver: bridge
